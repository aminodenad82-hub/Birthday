body {
      text-align: center;
      display: block;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #222;
}

.penguin{
  position: absolute;   /* allows free placement */
  top: 50px; 
  right: 40px;           /* distance from top edge */          /* distance from right edge */
  width: 20vw;   /* scales with viewport width */
max-width: 150px;
         /* resize as needed */
  height: 150px;
}
.penguin2{
  position: absolute;   /* allows free placement */
  top: 50px; 
  left: 50%;               /* center horizontally */
  transform: translateX(-50%);          /* distance from top edge */          /* distance from right edge */
  width: 20vw;   /* scales with viewport width */
max-width: 150px;
        /* resize as needed */
  height: 150px;
}
.penguin3{
  position: absolute;   /* allows free placement */
  top: 50px; 
  left: 40px;           /* distance from top edge */          /* distance from right edge */
  width: 20vw;   /* scales with viewport width */
max-width: 150px;
        /* resize as needed */
  height: 150px;
}




.star {
  position: absolute;
  top: -20px;              /* start above the screen */
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  animation: fall 1.5s linear infinite;
}
.star2{
  position: absolute;
  top: -20px;              /* start above the screen */
  width: 7px;
  height: 7px;
  background: rgb(255, 230, 3);
  border-radius: 50%;
  animation: fall 1.5s linear infinite;
}
.star3{
  position: absolute;
  top: -20px;              /* start above the screen */
  width: 7px;
  height: 7px;
  background: rgb(200, 3, 255);
  border-radius: 50%;
  animation: fall 1.5s linear infinite;
}

@keyframes fall {
  0%   { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(600px); opacity: 0; }
}


@keyframes glow {
    0%{
        color: #ebeb32f9;
        text-shadow: 2px 2px 5px  #f1f1f1f9;
    }
    50%{
        color: rgb(97, 97, 92);
        text-shadow: 2px 2px 5px none;
    }
    100%{
        color: #fffffaf9;
        text-shadow: 2px 2px 5px  #ebeb32f9;
    }
}

    



body {

.bread{

.plate{

}
.candle{
    margin:0 auto;
    justify-content: center;
    height: 50px;
    width: 20px;
    background-color: rgb(158, 8, 8);
}






.flame {
      margin: 0 auto;
      position: relative;
      width: 20px;
      height: 30px;
      background: radial-gradient(circle at 50% 30%, yellow, orange 70%, red 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; /* oval taper */
      animation: flicker 0.6s infinite alternate;
      box-shadow: 0 0 20px gold;
    }
    @keyframes flicker {
      0%   { transform: scaleY(1) scaleX(1); opacity: 1; }
      50%  { transform: scaleY(1.2) scaleX(0.9); opacity: 0.8; }
      100% { transform: scaleY(1) scaleX(1.1); opacity: 1; }
    }
    /* Phones */
@media (max-width: 600px) {
  h1 {
    margin-top: 100px;
    font-size: 1.5rem;
  }
  .penguin, .penguin2, .penguin3 {
    width: 80px;
    height: 80px;
    top: auto;
    bottom: 10px;
  }
}

/* Tablets */
@media (min-width: 601px) and (max-width: 1024px) {
  .penguin, .penguin2, .penguin3 {
    width: 120px;
    height: 120px;
  }
}

</style>
